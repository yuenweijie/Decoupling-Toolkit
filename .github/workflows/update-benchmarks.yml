name: Update URA benchmarks

on:
  schedule:
    - cron: "30 11 * * *"   # daily 11:30 UTC = 7:30pm Singapore time
  workflow_dispatch:          # also lets you run it manually from the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Refresh benchmarks from URA
        env:
          URA_ACCESS_KEY: ${{ secrets.URA_ACCESS_KEY }}
        run: python3 ura_update.py

      - name: Publish a clean root page
        run: cp Decoupling_Calculator.html index.html

      - name: Commit if anything changed
        run: |
          git config user.name "ura-bot"
          git config user.email "ura-bot@users.noreply.github.com"
          echo "$(date -u +%Y-%m-%d)" > last_updated.txt
          git add Decoupling_Calculator.html index.html last_updated.txt
          git diff --staged --quiet || git commit -m "Auto-update URA benchmarks ($(date -u +%Y-%m-%d))"
          git push

      - name: Purge jsDelivr cache
        run: |
          curl -s "https://purge.jsdelivr.net/gh/yuenweijie/Decoupling-Toolkit@main/last_updated.txt" || true
          curl -s "https://purge.jsdelivr.net/gh/yuenweijie/Decoupling-Toolkit@main/index.html" || true
